<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生信息列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2 class="text-center mb-3">学生信息列表</h2>

    <div th:if="${msg}" class="alert alert-success text-center" th:text="${msg}"></div>

    <div class="card mb-3">
        <div class="card-body p-3">
            <form th:action="@{/student/list}" method="get" class="row g-2 align-items-center">
                <div class="col-auto">
                    <input type="text" name="keyword" class="form-control form-control-sm" placeholder="搜索姓名/学号" th:value="${keyword}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary btn-sm">搜索</button>
                    <a th:href="@{/student/list}" class="btn btn-outline-secondary btn-sm">重置</a>
                </div>
            </form>
        </div>
    </div>

    <form th:action="@{/student/batchDelete}" method="post">
        <div class="d-flex justify-content-between mb-2">
            <button class="btn btn-danger btn-sm" onclick="return confirm('确定删除？')">批量删除</button>
            <div>
                <a th:href="@{/student/add}" class="btn btn-success btn-sm">新增学生</a>
            </div>
        </div>

        <table class="table table-sm table-bordered table-hover text-center bg-white">
            <thead class="table-light">
            <tr>
                <th><input type="checkbox" id="checkAll"></th>

                <th>
                    <a th:href="@{/student/list(page=${currentPage},keyword=${keyword},sortField=studentId,sortDir=${sortDir=='asc'?'desc':'asc'})}"
                       class="text-decoration-none text-dark">
                        学号
                        <span th:if="${sortField=='studentId'}">[[${sortDir=='asc'?'↑':'↓'}]]</span>
                    </a>
                </th>

                <th>姓名</th>
                <th>性别</th>
                <th>班级</th>
                <th>年龄</th>
                <th>生日</th>
                <th>电话</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${students}">
                <td><input type="checkbox" name="ids" th:value="${s.studentId}" class="itemCheck"></td>
                <td th:text="${s.studentId}"></td>
                <td th:text="${s.name}"></td>
                <td th:text="${s.gender}"></td>
                <td th:text="${s.className}"></td>
                <td th:text="${s.age}"></td>
                <td th:text="${s.birthDate}"></td>
                <td th:text="${s.phone}"></td>
                <td>
                    <a th:href="@{/student/edit/{id}(id=${s.studentId})}" class="btn btn-sm btn-primary">编辑</a>
                    <a th:href="@{/student/delete/{id}(id=${s.studentId})}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除？')">删</a>
                </td>
            </tr>
            </tbody>
        </table>
    </form>

    <div class="d-flex justify-content-center mt-3" th:if="${totalPages>0}">
        <ul class="pagination pagination-sm">
            <li class="page-item" th:classappend="${currentPage==1?'disabled':''}">
                <a class="page-link" th:href="@{/student/list(page=${currentPage-1},keyword=${keyword},sortField=${sortField},sortDir=${sortDir})}">上页</a>
            </li>
            <li class="page-item" th:classappend="${i==currentPage?'active':''}" th:each="i:${#numbers.sequence(1,totalPages)}">
                <a class="page-link" th:href="@{/student/list(page=${i},keyword=${keyword},sortField=${sortField},sortDir=${sortDir})}" th:text="${i}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage>=totalPages?'disabled':''}">
                <a class="page-link" th:href="@{/student/list(page=${currentPage+1},keyword=${keyword},sortField=${sortField},sortDir=${sortDir})}">下页</a>
            </li>
        </ul>
    </div>
    <p class="text-center small text-muted">共 [[${totalElements}]] 条 · 第 [[${currentPage}]] / [[${totalPages}]] 页</p>
</div>

<script>
    document.getElementById('checkAll').onchange=e=>{
        document.querySelectorAll('.itemCheck').forEach(i=>i.checked=e.target.checked);
    }
</script>
</body>
</html>
