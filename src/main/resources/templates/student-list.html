<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生信息列表</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="student-list-body">

<div class="student-list-container">

    <div class="student-list-header">
        <a th:href="@{/dashboard}" class="student-list-back-home">
            🏠 返回系统首页
        </a>

        <h1>学生信息列表</h1>
    </div>

    <div th:if="${msg}" class="student-list-alert-success" th:text="${msg}"></div>
    <div th:if="${errorMsg}" class="student-list-alert-danger" th:text="${errorMsg}"></div>

    <div class="student-list-toolbar-card">
        <div class="student-list-toolbar">

            <form th:action="@{/student/page/list}" method="get" class="student-list-toolbar-left">
                <input type="text"
                       name="keyword"
                       class="student-list-search-input"
                       placeholder="搜索姓名 / 学号"
                       th:value="${keyword}">

                <button type="submit" class="student-list-btn student-list-btn-primary">
                    搜索
                </button>

                <a th:href="@{/student/page/list}" class="student-list-btn student-list-btn-secondary">
                    重置
                </a>
            </form>

            <div class="student-list-toolbar-right">
                <a th:href="@{/student/page/add}" class="student-list-btn student-list-btn-success">
                    新增学生
                </a>

                <a th:href="@{/student/page/import}" class="student-list-btn student-list-btn-warning">
                    Excel 导入
                </a>
            </div>

        </div>
    </div>

    <form id="batchForm" th:action="@{/student/page/batchDelete}" method="post"></form>

    <div class="student-list-batch-row">
        <button type="submit"
                form="batchForm"
                class="student-list-btn student-list-btn-danger"
                onclick="return confirm('确定删除选中的学生吗？')">
            批量删除
        </button>
    </div>

    <table class="student-list-table">
        <thead>
        <tr>
            <th>
                <input type="checkbox" id="checkAll">
            </th>

            <th>
                <a th:href="@{/student/page/list(
                        page=${currentPage},
                        size=${size},
                        keyword=${keyword},
                        sortField='studentId',
                        sortDir=${sortDir == 'asc' ? 'desc' : 'asc'}
                    )}">
                    学号
                    <span th:if="${sortField == 'studentId'}"
                          th:text="${sortDir == 'asc' ? '↑' : '↓'}"></span>
                </a>
            </th>

            <th>
                <a th:href="@{/student/page/list(
                        page=${currentPage},
                        size=${size},
                        keyword=${keyword},
                        sortField='name',
                        sortDir=${sortDir == 'asc' ? 'desc' : 'asc'}
                    )}">
                    姓名
                    <span th:if="${sortField == 'name'}"
                          th:text="${sortDir == 'asc' ? '↑' : '↓'}"></span>
                </a>
            </th>

            <th>性别</th>
            <th>班级</th>
            <th>年龄</th>
            <th>生日</th>
            <th>电话</th>
            <th>操作</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="s : ${students}">
            <td>
                <input type="checkbox"
                       form="batchForm"
                       name="ids"
                       th:value="${s.studentId}"
                       class="itemCheck">
            </td>

            <td th:text="${s.studentId}">2026001</td>
            <td th:text="${s.name}">张三</td>
            <td th:text="${s.gender}">男</td>
            <td th:text="${s.className}">软件一班</td>
            <td th:text="${s.age}">20</td>
            <td th:text="${s.birthDate}">2003-09-01</td>
            <td th:text="${s.phone}">13800000000</td>

            <td>
                <div class="student-list-operation">
                    <a th:href="@{/student/page/edit/{studentId}(studentId=${s.studentId})}"
                       class="student-list-btn student-list-btn-primary">
                        编辑
                    </a>

                    <form th:action="@{/student/page/delete/{studentId}(studentId=${s.studentId})}"
                          method="post">
                        <button type="submit"
                                class="student-list-btn student-list-btn-danger"
                                onclick="return confirm('确定删除该学生吗？')">
                            删除
                        </button>
                    </form>
                </div>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(students)}">
            <td colspan="9" class="student-list-empty">
                暂无学生信息
            </td>
        </tr>

        </tbody>
    </table>

    <div class="student-list-pagination-wrap" th:if="${totalPages > 0}">
        <ul class="student-list-pagination">

            <li th:classappend="${currentPage == 1 ? ' disabled' : ''}">
                <a th:href="@{/student/page/list(
                       page=${currentPage - 1},
                       size=${size},
                       keyword=${keyword},
                       sortField=${sortField},
                       sortDir=${sortDir}
                   )}">
                    上页
                </a>
            </li>

            <li th:each="i : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${i == currentPage ? ' active' : ''}">
                <a th:text="${i}"
                   th:href="@{/student/page/list(
                       page=${i},
                       size=${size},
                       keyword=${keyword},
                       sortField=${sortField},
                       sortDir=${sortDir}
                   )}">
                    1
                </a>
            </li>

            <li th:classappend="${currentPage >= totalPages ? ' disabled' : ''}">
                <a th:href="@{/student/page/list(
                       page=${currentPage + 1},
                       size=${size},
                       keyword=${keyword},
                       sortField=${sortField},
                       sortDir=${sortDir}
                   )}">
                    下页
                </a>
            </li>

        </ul>
    </div>

    <p class="student-list-page-info" th:if="${totalPages > 0}">
        共 [[${totalElements}]] 条 · 第 [[${currentPage}]] / [[${totalPages}]] 页
    </p>

</div>

<script>
    const checkAll = document.getElementById("checkAll");

    if (checkAll) {
        checkAll.onchange = function () {
            document.querySelectorAll(".itemCheck").forEach(item => {
                item.checked = checkAll.checked;
            });
        };
    }
</script>

</body>
</html>
