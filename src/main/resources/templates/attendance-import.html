<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>批量导入考勤数据</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h3 class="text-center mb-4">考勤数据批量导入</h3>

    <!-- 消息提示 -->
    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <!-- 文件上传表单：必须添加 enctype="multipart/form-data" -->
    <form th:action="@{/attendance/import}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">选择Excel文件</label>
            <input type="file" name="file" class="form-control" accept=".xlsx,.xls" required>
            <div class="form-text">支持 xls / xlsx 格式，单个文件不超过 10MB</div>
        </div>

        <button type="submit" class="btn btn-primary w-100">上传并导入数据</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
