<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">系统首页</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="dashboard-page">

    <div class="dashboard-header">
        <div class="dashboard-header-top">
            <div class="dashboard-title" th:text="${title}">
                班级考勤管理系统首页
            </div>

            <div class="dashboard-user-badge">
                👤
                <span th:text="${loginUser != null ? loginUser.realName : '未登录'}">未登录</span>
                |
                <span th:text="${loginUser != null ? loginUser.role : '游客'}">游客</span>
            </div>
        </div>

        <p>欢迎使用智能班级考勤管理系统</p>
    </div>

    <div th:if="${errorMsg}" class="dashboard-error" th:text="${errorMsg}"></div>

    <div class="dashboard-menu-grid">

        <!-- 教师 / 管理员可见 -->
        <a th:if="${isManager}"
           th:href="@{/student/page/list}"
           class="dashboard-menu-card">
            <span class="dashboard-menu-icon">🎓</span>
            <span class="dashboard-menu-title">学生管理</span>
        </a>

        <!-- 教师 / 管理员可见 -->
        <a th:if="${isManager}"
           th:href="@{/course/page/list}"
           class="dashboard-menu-card">
            <span class="dashboard-menu-icon">📚</span>
            <span class="dashboard-menu-title">课程管理</span>
        </a>

        <!-- 只有学生可见 -->
        <a th:if="${loginUser != null and loginUser.role == 'STUDENT'}"
           th:href="@{/attendance/page/checkin}"
           class="dashboard-menu-card">
            <span class="dashboard-menu-icon">✅</span>
            <span class="dashboard-menu-title">考勤打卡</span>
        </a>

        <a th:if="${isManager}"
           th:href="@{/attendance/page/qrcode}"
           class="dashboard-menu-card">
            <span class="dashboard-menu-icon">📱</span>
            <span class="dashboard-menu-title">二维码考勤</span>
        </a>

        <!-- 教师 / 管理员可见 -->
        <a th:if="${isManager}"
           th:href="@{/attendance/page/list}"
           class="dashboard-menu-card">
            <span class="dashboard-menu-icon">📊</span>
            <span class="dashboard-menu-title">考勤记录</span>
        </a>

        <!-- 只有学生可见 -->
        <a th:if="${loginUser != null and loginUser.role == 'STUDENT'}"
           th:href="@{/leave/page/apply}"
           class="dashboard-menu-card">
            <span class="dashboard-menu-icon">📝</span>
            <span class="dashboard-menu-title">提交请假</span>
        </a>

        <!-- 教师 / 管理员可见 -->
        <a th:if="${isManager}"
           th:href="@{/leave/page/list}"
           class="dashboard-menu-card">
            <span class="dashboard-menu-icon">🗓️</span>
            <span class="dashboard-menu-title">请假管理</span>
        </a>

    </div>

    <div class="dashboard-btn-row">
        <a class="dashboard-logout-btn" th:href="@{/page/logout}">
            退出登录
        </a>
    </div>

</div>

</body>
</html>
