<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>课程信息维护</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f7f8fa;
            padding: 30px;
            color: #1f2937;
        }

        .box {
            max-width: 520px;
            margin: 50px auto;
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 16px;
            border: 1px solid #fecaca;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 9px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .btn {
            width: 100%;
            display: block;
            padding: 12px;
            border: none;
            border-radius: 9px;
            text-align: center;
            text-decoration: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            margin-top: 10px;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
            margin-top: 12px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2 th:text="${course.id == null ? '新增课程' : '编辑课程'}">新增课程</h2>

    <div th:if="${errorMsg}" class="error" th:text="${errorMsg}"></div>

    <form th:action="@{/course/page/save}" method="post">

        <input type="hidden" name="id" th:value="${course.id}">

        <div class="form-group">
            <label>课程名称：</label>
            <input type="text"
                   name="courseName"
                   th:value="${course.courseName}"
                   placeholder="请输入课程名称"
                   required>
        </div>

        <div class="form-group">
            <label>开始时间：</label>
            <input type="datetime-local"
                   name="startTime"
                   th:value="${startTimeStr}"
                   required>
        </div>

        <div class="form-group">
            <label>结束时间：</label>
            <input type="datetime-local"
                   name="endTime"
                   th:value="${endTimeStr}"
                   required>
        </div>

        <button type="submit" class="btn btn-primary">保存课程</button>

        <a th:href="@{/course/page/list}" class="btn btn-secondary">返回课程列表</a>

    </form>

</div>

</body>
</html>
