<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>考勤统计</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h3 class="text-center">学生考勤统计</h3>

  <div class="card mt-4">
    <div class="card-body">
      <h5>学生ID：[[${studentId}]]</h5>
      <hr>
      <p>总考勤次数：[[${stats.totalCount}]]</p>
      <p>正常：[[${stats.normalCount}]] 次</p>
      <p>迟到：[[${stats.lateCount}]] 次</p>
      <p>缺勤：[[${stats.absentCount}]] 次</p>
      <p>出勤率：[[${#numbers.formatDecimal(stats.attendanceRate, 1, 2)}]] %</p>
    </div>
  </div>
</div>
</body>
</html>
