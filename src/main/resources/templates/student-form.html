<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>学生信息录入</title>

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="student-form-body">

<div class="student-form-box">

  <h2 class="student-form-title">学生信息录入</h2>

  <div th:if="${errorMsg}"
       class="student-form-error"
       th:text="${errorMsg}">
  </div>

  <form th:action="@{/student/page/save}" method="post" class="student-form">

    <div class="student-form-group">
      <label>学号</label>
      <input name="studentId"
             th:value="${student.studentId}"
             required
             th:readonly="${student.studentId != null}">
    </div>

    <div class="student-form-group">
      <label>姓名</label>
      <input name="name"
             th:value="${student.name}"
             required>
    </div>

    <div class="student-form-group">
      <label>性别</label>
      <select name="gender" required>
        <option value="">请选择</option>
        <option value="男" th:selected="${student.gender == '男'}">男</option>
        <option value="女" th:selected="${student.gender == '女'}">女</option>
      </select>
    </div>

    <div class="student-form-group">
      <label>班级</label>
      <input name="className"
             th:value="${student.className}"
             required>
    </div>

    <div class="student-form-group">
      <label>年龄</label>
      <input type="number"
             name="age"
             th:value="${student.age}"
             min="1"
             max="100"
             required>
    </div>

    <div class="student-form-group">
      <label>出生日期</label>
      <input type="date"
             name="birthDate"
             th:value="${student.birthDate}"
             required>
    </div>

    <div class="student-form-group">
      <label>联系方式</label>
      <input name="phone"
             th:value="${student.phone}"
             placeholder="请输入 11 位手机号"
             required>
    </div>

    <button type="submit" class="student-form-submit">
      保存
    </button>

    <a th:href="@{/student/page/list}" class="student-form-back">
      返回学生列表
    </a>

  </form>

</div>

</body>
</html>
