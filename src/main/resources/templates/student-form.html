<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>学生信息录入</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#f7f8fa}
    .box{max-width:500px;margin:30px auto;background:#fff;padding:25px;border-radius:10px;box-shadow:0 2px 10px #00000010}
  </style>
</head>
<body>
<div class="box">
  <h4 class="text-center mb-3">学生信息录入</h4>
  <form th:action="@{/student/save}" method="post">
    <div class="mb-2">
      <label class="form-label small">学号</label>
      <input class="form-control form-control-sm" name="studentId" th:value="${student.studentId}"
             required th:readonly="${student.studentId!=null}">
    </div>
    <div class="mb-2">
      <label class="form-label small">姓名</label>
      <input class="form-control form-control-sm" name="name" th:value="${student.name}" required>
    </div>
    <div class="mb-2">
      <label class="form-label small">性别</label>
      <select class="form-select form-select-sm" name="gender">
        <option value="">请选择</option>
        <option value="男" th:selected="${student.gender=='男'}">男</option>
        <option value="女" th:selected="${student.gender=='女'}">女</option>
      </select>
    </div>
    <div class="mb-2">
      <label class="form-label small">班级</label>
      <input class="form-control form-control-sm" name="className" th:value="${student.className}" required>
    </div>
    <div class="mb-2">
      <label class="form-label small">年龄</label>
      <input class="form-control form-control-sm" name="age" th:value="${student.age}">
    </div>
    <div class="mb-2">
      <label class="form-label small">出生日期</label>
      <input type="date" class="form-control form-control-sm" name="birthDate" th:value="${student.birthDate}">
    </div>
    <div class="mb-3">
      <label class="form-label small">联系方式</label>
      <input class="form-control form-control-sm" name="phone" th:value="${student.phone}">
    </div>
    <button class="btn btn-primary w-100 btn-sm">保存</button>
    <a th:href="@{/student/list}" class="btn btn-outline-secondary w-100 btn-sm mt-2">返回</a>
  </form>
</div>
</body>
</html>
