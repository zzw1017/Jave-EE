<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 班级考勤管理系统</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="register-body">

<div class="register-container">

    <h1 class="register-title">用户注册</h1>

    <p th:if="${errorMsg}" th:text="${errorMsg}" class="register-error"></p>

    <form th:action="@{/page/register}" method="post" class="register-form">

        <div class="register-form-group">
            <label>学号/工号：</label>
            <input type="text"
                   name="username"
                   placeholder="学生请输入学号，教师请输入工号"
                   required>
        </div>

        <div class="register-form-group">
            <label>真实姓名：</label>
            <input type="text"
                   name="realName"
                   placeholder="请输入真实姓名"
                   required>
        </div>

        <div class="register-form-group">
            <label>密码：</label>
            <input type="password"
                   name="password"
                   placeholder="请输入密码"
                   required>
        </div>

        <div class="register-form-group">
            <label>确认密码：</label>
            <input type="password"
                   name="confirmPassword"
                   placeholder="请再次输入密码"
                   required>
        </div>

        <div class="register-form-group">
            <label>角色：</label>
            <select name="role" required>
                <option value="STUDENT">学生</option>
                <option value="TEACHER">教师</option>
            </select>
        </div>

        <button type="submit" class="register-submit">
            立即注册
        </button>

    </form>

    <div class="register-link">
        已有账号？
        <a th:href="@{/login}">去登录</a>
    </div>

</div>

</body>
</html>
