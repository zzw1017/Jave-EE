<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 班级考勤管理系统</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="login-body">

<div class="login-container">

    <h1 class="login-title">用户登录</h1>

    <p th:if="${errorMsg}" th:text="${errorMsg}" class="login-error"></p>
    <p th:if="${successMsg}" th:text="${successMsg}" class="login-success"></p>

    <form th:action="@{/page/login}" method="post" class="login-form">

        <div class="login-form-group">
            <label>学号/工号：</label>
            <input type="text"
                   name="username"
                   placeholder="学生请输入学号，教师请输入工号"
                   required>
        </div>

        <div class="login-form-group">
            <label>密码：</label>
            <input type="password"
                   name="password"
                   placeholder="请输入密码"
                   required>
        </div>

        <button type="submit" class="login-submit">
            立即登录
        </button>

    </form>

    <div class="login-link">
        没有账号？
        <a th:href="@{/register}">去注册</a>
    </div>

</div>

</body>
</html>
