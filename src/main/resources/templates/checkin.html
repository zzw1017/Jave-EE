<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>签到</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar::navbar}"></div>
<div class="container mt-5">
    <h3 class="text-center">学生签到</h3>
    <form th:action="@{/attendance/checkin}" method="post" class="mt-4">
        <div class="mb-3">
            <label>课程编号</label>
            <input type="number" name="courseId" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>学生编号</label>
            <input type="number" name="studentId" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>座位行数</label>
            <input type="number" name="seatRow" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>座位列数</label>
            <input type="number" name="seatCol" class="form-control" required>
        </div>
        <button class="btn btn-primary w-100">立即签到</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
